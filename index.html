<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Miglexy Web</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:url("fundo.png") center center fixed;
background-size:cover;
color:white;
min-height:100vh;
}

.overlay{
background:rgba(0,0,0,.75);
min-height:100vh;
padding:25px;
}

header{
text-align:center;
margin-bottom:25px;
}

header h1{
font-size:3rem;
text-shadow:0 0 15px #00aaff;
}

header p{
opacity:.8;
margin-top:8px;
}

.layout{
display:grid;
grid-template-columns:220px 1fr 250px;
gap:20px;
}

.panel{
background:rgba(255,255,255,.06);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.1);
border-radius:15px;
padding:15px;
}

.sidebar h2{
margin-bottom:10px;
}

.sidebar button{
width:100%;
margin-bottom:8px;
padding:10px;
background:#111827;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
transition:.2s;
}

.sidebar button:hover{
background:#1f2937;
}

.search{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:15px;
background:#111827;
color:white;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

.card{
background:rgba(255,255,255,.08);
border-radius:15px;
overflow:hidden;
transition:.3s;
border:1px solid rgba(255,255,255,.1);
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 15px rgba(0,170,255,.4);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card h3{
margin-bottom:8px;
}

.card p{
font-size:.9rem;
opacity:.8;
margin-bottom:12px;
}

.card a{
display:inline-block;
padding:10px 15px;
background:#00aaff;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

.right{
display:flex;
flex-direction:column;
gap:20px;
}

.character{
text-align:center;
}

.character img{
width:100%;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

.music{
text-align:center;
}

.music img{
width:130px;
cursor:pointer;
transition:.2s;
}

.music img:hover{
transform:scale(1.05);
}

.music button{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#00aaff;
color:white;
cursor:pointer;
}

.footer{
text-align:center;
margin-top:30px;
opacity:.6;
}

@media(max-width:900px){
.layout{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="overlay">

<header>
<h1>Miglexy Games</h1>
<p>Jogos online, emuladores e coisas aleatórias.</p>
</header>

<div class="layout">

<div class="panel sidebar">

<h2>Categorias</h2>

<button onclick="mostrarCategoria('todos')">Todos</button>
<button onclick="mostrarCategoria('jogos')">Jogos</button>
<button onclick="mostrarCategoria('sandbox')">Sandbox</button>
<button onclick="mostrarCategoria('extras')">Extras</button>

</div>

<div class="panel">

<input
class="search"
id="pesquisa"
placeholder="Pesquisar jogo..."
oninput="renderizarJogos()">

<div class="games" id="games"></div>

</div>

<div class="right">

<div class="panel character">
<h2>Niko</h2>
<img src="personagem.gif">
</div>

<div class="panel music">

<h2>Música</h2>

<img src="caixadesom.gif" onclick="toggleMusic()">

<br>

<button onclick="toggleMusic()">
Tocar / Pausar
</button>

<audio id="music" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

</div>

</div>

</div>

<div class="footer">
Feito por Miglexy
</div>

</div>

<script>

const jogos = [

{
nome:"Five Nights at Freddy's",
descricao:"Versão online inspirada em FNAF.",
categoria:"jogos",
imagem:"https://placehold.co/400x200?text=FNAF",
link:"https://fnafgame.io/"
},

{
nome:"Quenq",
descricao:"Coleção de jogos e experiências online.",
categoria:"extras",
imagem:"https://placehold.co/400x200?text=QUENQ",
link:"https://quenq.com/#google_vignette"
},

{
nome:"Neal.fun",
descricao:"Experimentos, curiosidades e minigames.",
categoria:"extras",
imagem:"https://placehold.co/400x200?text=NEAL.FUN",
link:"https://neal.fun/"
},

{
nome:"EmulatorJS",
descricao:"Emuladores retrô direto no navegador.",
categoria:"sandbox",
imagem:"https://placehold.co/400x200?text=EMULATORJS",
link:"https://emulatorjs.com/"
},

{
nome:"Happy Wheels",
descricao:"Clássico jogo de física e caos.",
categoria:"jogos",
imagem:"https://placehold.co/400x200?text=HAPPY+WHEELS",
link:"https://totaljerkface.com/happy_wheels.tjf"
},

{
nome:"Crazy Cattle 3D",
descricao:"Caos absoluto com animais explosivos.",
categoria:"jogos",
imagem:"https://placehold.co/400x200?text=CRAZY+CATTLE",
link:"https://www.crazycattle.org/index.html"
},

{
nome:"Cookie Clicker",
descricao:"Clique em biscoitos e domine o universo.",
categoria:"jogos",
imagem:"https://placehold.co/400x200?text=COOKIE+CLICKER",
link:"https://cookieclicker.eu/cookieclicker/"
},

{
nome:"Eaglercraft",
descricao:"Minecraft no navegador.",
categoria:"sandbox",
imagem:"https://placehold.co/400x200?text=EAGLERCRAFT",
link:"https://eaglercraftx.pages.dev/"
}

];

let categoriaAtual = "todos";

function mostrarCategoria(cat){
categoriaAtual = cat;
renderizarJogos();
}

function renderizarJogos(){

const container = document.getElementById("games");
const pesquisa = document.getElementById("pesquisa").value.toLowerCase();

container.innerHTML = "";

const filtrados = jogos.filter(j => {

const categoriaOk =
categoriaAtual === "todos" ||
j.categoria === categoriaAtual;

const textoOk =
j.nome.toLowerCase().includes(pesquisa);

return categoriaOk && textoOk;

});

filtrados.forEach(jogo=>{

container.innerHTML += `
<div class="card">
<img src="${jogo.imagem}">
<div class="card-content">
<h3>${jogo.nome}</h3>
<p>${jogo.descricao}</p>
<a href="${jogo.link}" target="_blank">
Abrir
</a>
</div>
</div>
`;

});

}

const music = document.getElementById("music");

function toggleMusic(){
if(music.paused){
music.play();
}else{
music.pause();
}
}

renderizarJogos();

</script>

</body>
</html>
