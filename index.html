<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miglexy Games</title>
<link rel="icon" href="favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{
background:url("fundo.png") center/cover fixed;
color:white;
min-height:100vh;
}
.overlay{
background:rgba(0,0,0,.78);
min-height:100vh;
padding:20px;
}
header{text-align:center;margin-bottom:20px}
h1{font-size:3rem}

.layout{
display:grid;
grid-template-columns:240px 1fr 260px;
gap:20px;
}

.panel{
background:rgba(255,255,255,.06);
border-radius:15px;
padding:15px;
backdrop-filter:blur(8px);
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:8px;
border:none;
border-radius:10px;
background:#081a40;
color:white;
cursor:pointer;
}

.news-box,.discord-box{
margin-top:15px;
background:rgba(255,255,255,.05);
padding:12px;
border-radius:10px;
}

.discord-box a{
display:block;
text-align:center;
background:#5865F2;
color:white;
padding:10px;
border-radius:8px;
text-decoration:none;
margin-top:10px;
}

.search{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:15px;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

.card{
background:rgba(255,255,255,.08);
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{padding:12px}

.card a{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#00aaff;
color:white;
text-decoration:none;
border-radius:8px;
}

.character img{width:100%}

.music img{
width:120px;
cursor:pointer;
}

.footer{
text-align:center;
margin-top:20px;
opacity:.7;
}

@media(max-width:900px){
.layout{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="overlay">

<header>
<h1>Miglexy Games</h1>
<p>Jogos online, emuladores e coisas aleatórias.</p>
</header>

<div class="layout">

<div class="panel sidebar">

<h2>Categorias</h2>

<button onclick="mostrarCategoria('todos')">Todos</button>
<button onclick="mostrarCategoria('jogos')">Jogos</button>
<button onclick="mostrarCategoria('sandbox')">Sandbox</button>
<button onclick="mostrarCategoria('extras')">Extras</button>

<div class="news-box">
<h3> Novidades</h3>
<ul>
<li> Eaglercraft adicionado</li>
<li> Cookie Clicker disponível</li>
<li> Discord aberto</li>
<li> Mais jogos em breve</li>
</ul>
</div>

<div class="discord-box">
<h3> Discord</h3>
<p>Entre no servidor oficial!</p>
<a href="https://discord.gg/uNbfGEGPn" target="_blank">Entrar</a>
</div>

</div>

<div class="panel">

<input class="search" id="pesquisa" placeholder="Pesquisar..." oninput="renderizarJogos()">

<div class="games" id="games"></div>

</div>

<div class="panel">

<div class="character">
<h2>Niko</h2>
<img src="personagem.gif">
</div>

<hr style="margin:15px 0">

<div class="music">
<h2>Música</h2>
<img src="caixadesom.gif" onclick="toggleMusic()">
<audio id="music" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>
</div>

</div>

</div>

<div class="footer">
 Feito Pelo Miglexy
</div>

</div>

<script>
const jogos=[
{nome:"Five Nights at Freddy's",descricao:"Versão online inspirada em FNAF.",categoria:"jogos",imagem:"https://placehold.co/400x200?text=FNAF",link:"https://fnafgame.io/"},
{nome:"Quenq",descricao:"Coleção de jogos online.",categoria:"extras",imagem:"https://placehold.co/400x200?text=QUENQ",link:"https://quenq.com/#google_vignette"},
{nome:"Neal.fun",descricao:"Experiências e minigames.",categoria:"extras",imagem:"https://placehold.co/400x200?text=NEALFUN",link:"https://neal.fun/"},
{nome:"EmulatorJS",descricao:"Emuladores no navegador.",categoria:"sandbox",imagem:"https://placehold.co/400x200?text=EMU",link:"https://emulatorjs.com/"},
{nome:"Happy Wheels",descricao:"Caos e física.",categoria:"jogos",imagem:"https://placehold.co/400x200?text=HAPPY",link:"https://totaljerkface.com/happy_wheels.tjf"},
{nome:"Crazy Cattle",descricao:"Animais explosivos.",categoria:"jogos",imagem:"https://placehold.co/400x200?text=CATTLE",link:"https://www.crazycattle.org/index.html"},
{nome:"Cookie Clicker",descricao:"Clique em biscoitos.",categoria:"jogos",imagem:"https://placehold.co/400x200?text=COOKIE",link:"https://cookieclicker.eu/cookieclicker/"},
{nome:"Eaglercraft",descricao:"Minecraft no navegador.",categoria:"sandbox",imagem:"https://placehold.co/400x200?text=MINECRAFT",link:"https://eaglercraftx.pages.dev/"}
];

let categoriaAtual="todos";

function mostrarCategoria(c){
categoriaAtual=c;
renderizarJogos();
}

function renderizarJogos(){
const p=document.getElementById("pesquisa").value.toLowerCase();
const g=document.getElementById("games");
g.innerHTML="";

jogos.filter(j=>(categoriaAtual==="todos"||j.categoria===categoriaAtual)&&j.nome.toLowerCase().includes(p))
.forEach(j=>{
g.innerHTML+=`
<div class="card">
<img src="${j.imagem}">
<div class="card-content">
<h3>${j.nome}</h3>
<p>${j.descricao}</p>
<a href="${j.link}" target="_blank">Abrir</a>
</div>
</div>`;
});
}

function toggleMusic(){
const m=document.getElementById("music");
if(m.paused)m.play(); else m.pause();
}

renderizarJogos();
</script>

</body>
</html>
